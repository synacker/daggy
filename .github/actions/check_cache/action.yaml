name: Check cache 
description: Check is cache exists
inputs:
  profile:
    description: conan-profile
    required: true
    default: default

outputs:
  exists:  
    value: ${{steps.check-cache.outputs.cache_hit}}

runs:
  using: composite
  steps:
      - name: Cache conan packages
        id: check-cache
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: ${{inputs.profile}}
          lookup-only: true

